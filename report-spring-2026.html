<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Отчёт · Тестирование · Весна 2026 · AB Road</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Mulish:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bordeaux: #5C1A3A;
  --teal: #2BBFBF;
  --white: #FFFFFF;
  --bg: #F7F5F2;
  --bg2: #EEEBE6;
  --border: rgba(0,0,0,.08);
  --text: #1A1210;
  --text-muted: #7A6E6A;
  --text-hint: #B0A8A4;
  --font-head: 'Unbounded', sans-serif;
  --font-body: 'Mulish', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
.page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── HEADER ── */
.rpt-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; flex-wrap: wrap; gap: 12px; }
.rpt-title  { font-family: var(--font-head); font-size: 22px; font-weight: 700; color: var(--bordeaux); line-height: 1.2; }
.rpt-sub    { font-family: var(--font-head); font-size: 10px; font-weight: 400; color: var(--text-hint); margin-top: 5px; letter-spacing: .06em; }
.rpt-meta   { font-size: 11px; color: var(--text-hint); text-align: right; }

/* ── SECTION ── */
.section       { margin-bottom: 48px; }
.section-title { font-family: var(--font-head); font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 16px; }

/* ── SUMMARY CARDS ── */
.sum-grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
.sum-card  { background: var(--white); border: 0.5px solid var(--border); border-radius: 20px; padding: 24px 26px; }
.sum-lbl   { font-family: var(--font-head); font-size: 8px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 12px; }
.sum-val   { font-family: var(--font-head); font-size: 48px; font-weight: 700; color: var(--bordeaux); line-height: 1; letter-spacing: -.03em; }
.sum-val .u { font-size: 20px; font-weight: 400; opacity: .4; }
.sum-note  { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

/* ── INSIGHTS ── */
.insights-box {
  background: var(--bordeaux); border-radius: 20px; padding: 22px 26px;
  margin-bottom: 48px;
}
.insights-title { font-family: var(--font-head); font-size: 8px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 14px; }
.insights-list  { display: flex; flex-direction: column; gap: 8px; }
.insight-item {
  display: flex; align-items: flex-start; gap: 10px;
  font-size: 13px; color: rgba(255,255,255,.9); line-height: 1.4;
}
.insight-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); flex-shrink: 0; margin-top: 6px; }

/* ── LEVEL CARDS ── */
.level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 14px; }
.level-card {
  background: var(--white); border: 0.5px solid var(--border);
  border-radius: 20px; padding: 22px 22px 24px;
}
.level-tag {
  display: inline-flex; font-family: var(--font-head); font-size: 9px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase; padding: 4px 12px; border-radius: 7px; margin-bottom: 18px;
}
.level-big   { font-family: var(--font-head); font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -.02em; margin-bottom: 2px; }
.level-sub   { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; }
.level-stat  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.level-slbl  { font-size: 11px; color: var(--text-muted); }
.level-sval  { font-family: var(--font-head); font-size: 12px; font-weight: 700; }
.level-divider { height: 0.5px; background: var(--border); margin: 14px 0; }
.skill-bars  { display: flex; flex-direction: column; gap: 6px; }
.sb-row      { display: grid; grid-template-columns: 70px 1fr 34px; align-items: center; gap: 7px; }
.sb-lbl      { font-size: 10px; color: var(--text-muted); }
.sb-track    { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
.sb-fill     { height: 100%; border-radius: 3px; }
.sb-pct      { font-family: var(--font-head); font-size: 9px; font-weight: 700; text-align: right; }
.weak-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-head); font-size: 8px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  background: rgba(92,26,58,.1); color: var(--bordeaux);
  padding: 3px 8px; border-radius: 5px; margin-top: 12px;
}
.weak-tag::before { content: '↓'; font-size: 10px; }

/* ── GROUP SECTION ── */
.level-group-section { margin-bottom: 36px; }
.lgs-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.lgs-tag {
  font-family: var(--font-head); font-size: 9px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 7px;
}
.lgs-line { flex: 1; height: 0.5px; background: var(--border); }

.group-cards { display: flex; flex-wrap: wrap; gap: 12px; }
.group-card  {
  background: var(--white); border: 0.5px solid var(--border);
  border-radius: 18px; padding: 18px 20px; min-width: 220px; flex: 1 1 220px; max-width: 340px;
}
.gc-name  { font-family: var(--font-head); font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.gc-count { font-size: 11px; color: var(--text-muted); margin-bottom: 14px; }

.gc-zone       { margin-bottom: 12px; }
.gc-zone:last-child { margin-bottom: 0; }
.gc-zone-lbl   {
  font-family: var(--font-head); font-size: 8px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 7px;
}
.gc-zone-lbl.z-pass { color: #0A6A6A; }
.gc-zone-lbl.z-mid  { color: var(--text-hint); }
.gc-zone-lbl.z-low  { color: var(--bordeaux); }

.chips      { display: flex; flex-wrap: wrap; gap: 5px; }
.chip       { display: inline-flex; align-items: center; gap: 5px; border-radius: 8px; padding: 5px 10px; font-size: 11px; line-height: 1.2; }
.chip-pass  { background: rgba(43,191,191,.12); color: #085858; }
.chip-mid   { background: var(--bg2); color: var(--text-muted); }
.chip-low   { background: rgba(92,26,58,.09); color: var(--bordeaux); }
.chip-score { font-family: var(--font-head); font-size: 10px; font-weight: 700; opacity: .8; }
.chip-skill { font-family: var(--font-head); font-size: 8px; font-weight: 700; letter-spacing: .03em; opacity: .7; text-transform: uppercase; }
.chip-name  { font-weight: 600; }
.gc-none    { font-size: 11px; color: var(--text-hint); font-style: italic; }

/* ── LOADING ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 14px; color: var(--text-hint); }
.spinner { width: 26px; height: 26px; border: 2.5px solid var(--bg2); border-top-color: var(--teal); border-radius: 50%; animation: spin .75s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── LEVEL COLORS ── */
.lc-starters { background: rgba(212,133,10,.12); color: #9A5C00; }
.lc-movers   { background: rgba(107,53,168,.10); color: #5A2080; }
.lc-flyers   { background: rgba(42,122,42,.10);  color: #1A6020; }
.lc-key      { background: rgba(26,106,154,.12); color: #0A4A7A; }
.lc-pet      { background: rgba(139,31,90,.10);  color: #6A0040; }
.lc-other    { background: var(--bg2); color: var(--text-muted); }
.tc-starters { color: #9A5C00; }
.tc-movers   { color: #5A2080; }
.tc-flyers   { color: #1A6020; }
.tc-key      { color: #0A4A7A; }
.tc-pet      { color: #6A0040; }

@media print {
  body { background: white; }
  .section { break-inside: avoid; }
  .page { padding: 16px; }
}
</style>
</head>
<body>
<div class="page">
  <div id="app"><div class="loading"><div class="spinner"></div><span>Загружаем данные…</span></div></div>
</div>
<script>
'use strict';
const SHEET_ID      = '1POSNc2t9qv0HtnuCTIu0Htn9ZohqaBv7PWl3b-eoO8E';
const TOTAL_ENROLLED = 87;

function gvizUrl(sheet) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheet)}`;
}
async function fetchSheet(sheet) {
  const r   = await fetch(gvizUrl(sheet));
  const txt = await r.text();
  const m   = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error(`Не удалось загрузить лист «${sheet}»`);
  return JSON.parse(m[1]).table.rows;
}

function strVal(c) { return (!c || c.v == null) ? '' : String(c.v).trim(); }
function cellPct(c) {
  if (!c || c.v == null) return null;
  const v = c.v;
  if (typeof v === 'number') return v <= 1 ? Math.round(v * 100) : Math.round(v);
  const raw = String(c.f || v).replace('%','').replace(',','.').trim();
  if (!raw || raw==='-' || raw==='Резерв' || raw.includes('VALUE') || raw==='-%-') return null;
  const n = parseFloat(raw);
  return isNaN(n) ? null : Math.round(n);
}
function avg(arr) {
  const v = arr.filter(x => x !== null && !isNaN(x));
  return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null;
}
function normLevel(raw) {
  const l = (raw||'').toLowerCase();
  if (l.includes('starter')) return 'Starters';
  if (l.includes('mover'))   return 'Movers';
  if (l.includes('flyer'))   return 'Flyers';
  if (l.includes('key'))     return 'KEY';
  if (l.includes('prelim') || l.includes('pet')) return 'PET';
  return raw || '?';
}
function lvlCls(level) {
  const l = (level||'').toLowerCase();
  if (l.includes('starter')) return 'starters';
  if (l.includes('mover'))   return 'movers';
  if (l.includes('flyer'))   return 'flyers';
  if (l.includes('key'))     return 'key';
  if (l.includes('pet')||l.includes('prelim')) return 'pet';
  return 'other';
}
function pctCol(v) {
  if (v===null) return 'var(--text-hint)';
  return v>=70 ? '#2BBFBF' : v>=50 ? '#D4850A' : '#5C1A3A';
}
function sbRow(label, v) {
  const col = v===null ? 'var(--bg2)' : pctCol(v);
  return `<div class="sb-row">
    <span class="sb-lbl">${label}</span>
    <div class="sb-track"><div class="sb-fill" style="width:${v||0}%;background:${col}"></div></div>
    <span class="sb-pct" style="color:${col}">${v!==null?v+'%':'—'}</span>
  </div>`;
}

function parseRows(rows, isHigh) {
  const out = [];
  if (!rows) return out;
  rows.forEach(row => {
    if (!row.c) return;
    const c = row.c;
    const level = normLevel(strVal(c[0]));
    const group = strVal(c[1]);
    const name  = strVal(c[3]);
    if (!name) return;
    if (!isHigh) {
      const lis   = cellPct(c[6]);
      const rw    = cellPct(c[9]);
      const spk   = cellPct(c[12]);
      const total = cellPct(c[15]);
      out.push({ level, group, name, listening:lis, rw, speaking:spk, total });
    } else {
      const lis   = cellPct(c[6]);
      const read  = cellPct(c[9]);
      const wrt   = cellPct(c[12]);
      const spk   = cellPct(c[15]);
      const total = cellPct(c[18]);
      out.push({ level, group, name, listening:lis, rw:avg([read,wrt]), speaking:spk, total });
    }
  });
  return out;
}

function computeLevel(students) {
  const map = {};
  students.forEach(s => { if(!map[s.level]) map[s.level]=[]; map[s.level].push(s); });
  const ORDER = ['Starters','Movers','Flyers','KEY','PET'];
  return Object.entries(map)
    .sort((a,b)=>{const ia=ORDER.indexOf(a[0]),ib=ORDER.indexOf(b[0]); return (ia<0?99:ia)-(ib<0?99:ib);})
    .map(([level,ss])=>{
      const done = ss.filter(s=>s.total!==null);
      const pass = done.filter(s=>s.total>=70);
      const lis  = avg(ss.map(s=>s.listening).filter(v=>v!==null));
      const rw   = avg(ss.map(s=>s.rw).filter(v=>v!==null));
      const spk  = avg(ss.map(s=>s.speaking).filter(v=>v!==null));
      const skills = [['Listening',lis],['Reading & Writing',rw],['Speaking',spk]];
      const weak = skills.filter(([,v])=>v!==null).sort((a,b)=>a[1]-b[1])[0];
      return { level, count:ss.length, wrote:done.length,
        avg:avg(done.map(s=>s.total)), passing:pass.length,
        passRate:done.length?Math.round(pass.length/done.length*100):0,
        lis, rw, spk, weak };
    });
}

function computeGroups(students) {
  const map = {};
  students.forEach(s=>{
    const key = s.level+'|||'+s.group;
    if(!map[key]) map[key]={level:s.level, group:s.group, ss:[]};
    map[key].ss.push(s);
  });
  return Object.values(map);
}

function generateInsights(students, lvlStats) {
  const insights = [];
  const done = students.filter(s=>s.total!==null);

  // Best / worst level
  const ranked = lvlStats.filter(l=>l.avg!==null).sort((a,b)=>b.avg-a.avg);
  if (ranked.length>=2) {
    insights.push(`Лучший средний результат — <b>${ranked[0].level}</b>: ${ranked[0].avg}%`);
    insights.push(`Сложнее всего дался тест — <b>${ranked[ranked.length-1].level}</b>: ${ranked[ranked.length-1].avg}%`);
  }

  // Weakest skill overall
  const allLis = avg(done.map(s=>s.listening).filter(v=>v!==null));
  const allRW  = avg(done.map(s=>s.rw).filter(v=>v!==null));
  const allSpk = avg(done.map(s=>s.speaking).filter(v=>v!==null));
  const skills = [['Listening',allLis],['Reading & Writing',allRW],['Speaking',allSpk]];
  const weakSkill = skills.filter(([,v])=>v!==null).sort((a,b)=>a[1]-b[1])[0];
  if (weakSkill) insights.push(`Самый слабый навык по всей школе — <b>${weakSkill[0]}</b>: средний ${weakSkill[1]}%`);

  // Levels where a specific skill is weak
  lvlStats.forEach(l=>{
    if(l.weak && l.weak[1]!==null && l.weak[1]<55)
      insights.push(`У <b>${l.level}</b> особенно проседает <b>${l.weak[0]}</b>: ${l.weak[1]}%`);
  });

  // Students below 50%
  const attention = done.filter(s=>s.total<50);
  if (attention.length>0)
    insights.push(`${attention.length} ${attention.length===1?'ребёнок набрал':'детей набрали'} менее 50% — стоит обсудить на собрании`);
  else
    insights.push(`Нет детей ниже 50% — сильный результат`);

  return insights;
}

function render(students) {
  const lvlStats = computeLevel(students);
  const groups   = computeGroups(students);
  const done     = students.filter(s=>s.total!==null);
  const passing  = done.filter(s=>s.total>=70);
  const insights = generateInsights(students, lvlStats);
  const now = new Date().toLocaleString('ru-RU',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});

  // Group by level for rendering
  const ORDER = ['Starters','Movers','Flyers','KEY','PET'];
  const byLevelGroups = {};
  groups.forEach(g => {
    if(!byLevelGroups[g.level]) byLevelGroups[g.level]=[];
    byLevelGroups[g.level].push(g);
  });

  document.getElementById('app').innerHTML = `

  <!-- HEADER -->
  <div class="rpt-header">
    <div>
      <div class="rpt-title">Тестирование · Весна 2026</div>
      <div class="rpt-sub">AB Road Studio · для преподавателей</div>
    </div>
    <div class="rpt-meta">${now}</div>
  </div>

  <!-- SUMMARY -->
  <div class="section">
    <div class="section-title">Общая сводка</div>
    <div class="sum-grid">
      <div class="sum-card">
        <div class="sum-lbl">Написали тест</div>
        <div class="sum-val">${done.length}<span class="u"> / ${TOTAL_ENROLLED}</span></div>
        <div class="sum-note">детей из зачисленных</div>
      </div>
      <div class="sum-card">
        <div class="sum-lbl">Результат 70% и выше</div>
        <div class="sum-val" style="color:var(--teal)">${passing.length}<span class="u"> / ${done.length}</span></div>
        <div class="sum-note">${done.length?Math.round(passing.length/done.length*100):0}% написавших тест</div>
      </div>
    </div>
  </div>

  <!-- INSIGHTS -->
  <div class="insights-box">
    <div class="insights-title">На что обратить внимание</div>
    <div class="insights-list">
      ${insights.map(i=>`<div class="insight-item"><div class="insight-dot"></div><span>${i}</span></div>`).join('')}
    </div>
  </div>

  <!-- BY LEVEL -->
  <div class="section">
    <div class="section-title">По уровням</div>
    <div class="level-grid">
      ${lvlStats.map(l => {
        const cls = lvlCls(l.level);
        const passCol = l.passRate>=70?'var(--teal)':l.passRate>=50?'#D4850A':'var(--bordeaux)';
        return `
        <div class="level-card">
          <div class="level-tag lc-${cls}">${l.level}</div>
          <div class="level-big tc-${cls}">${l.passRate}%</div>
          <div class="level-sub">успеваемость · ${l.passing} из ${l.wrote}</div>
          <div class="level-stat">
            <span class="level-slbl">Средний % выполнения</span>
            <span class="level-sval" style="color:${pctCol(l.avg)}">${l.avg??'—'}%</span>
          </div>
          <div class="level-divider"></div>
          <div class="skill-bars">
            ${sbRow('Listening', l.lis)}
            ${sbRow('Reading & Writing', l.rw)}
            ${sbRow('Speaking', l.spk)}
          </div>
          ${l.weak && l.weak[1]!==null ? `<div class="weak-tag">слабее всего: ${l.weak[0]}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- BY GROUP -->
  <div class="section">
    <div class="section-title">По группам</div>
    ${ORDER.filter(lv => byLevelGroups[lv]).map(lv => {
      const cls = lvlCls(lv);
      return `
      <div class="level-group-section">
        <div class="lgs-header">
          <span class="lgs-tag lc-${cls}">${lv}</span>
          <div class="lgs-line"></div>
        </div>
        <div class="group-cards">
          ${byLevelGroups[lv].map(g => {
            const done2  = g.ss.filter(s=>s.total!==null);
            const pass   = done2.filter(s=>s.total>=70).sort((a,b)=>b.total-a.total);
            const mid    = done2.filter(s=>s.total>=50&&s.total<70).sort((a,b)=>b.total-a.total);
            const low    = done2.filter(s=>s.total<50).sort((a,b)=>a.total-b.total);

            function weakSkill(s) {
              const sk=[['Lis',s.listening],['R&W',s.rw],['Spk',s.speaking]];
              const w=sk.filter(([,v])=>v!==null).sort((a,b)=>a[1]-b[1])[0];
              return w ? w[0] : null;
            }

            return `
            <div class="group-card">
              <div class="gc-name">${g.group}</div>
              <div class="gc-count">${done2.length} написали тест</div>

              ${pass.length>0?`
              <div class="gc-zone">
                <div class="gc-zone-lbl z-pass">70% и выше · ${pass.length}</div>
                <div class="chips">
                  ${pass.map(s=>`<div class="chip chip-pass"><span class="chip-name">${s.name.split(' ').slice(0,2).join(' ')}</span><span class="chip-score">${s.total}%</span></div>`).join('')}
                </div>
              </div>`:''}

              ${mid.length>0?`
              <div class="gc-zone">
                <div class="gc-zone-lbl z-mid">50–69% · ${mid.length}</div>
                <div class="chips">
                  ${mid.map(s=>`<div class="chip chip-mid"><span class="chip-name">${s.name.split(' ').slice(0,2).join(' ')}</span><span class="chip-score">${s.total}%</span></div>`).join('')}
                </div>
              </div>`:''}

              ${low.length>0?`
              <div class="gc-zone">
                <div class="gc-zone-lbl z-low">менее 50% · ${low.length}</div>
                <div class="chips">
                  ${low.map(s=>{const w=weakSkill(s); return `<div class="chip chip-low"><span class="chip-name">${s.name.split(' ').slice(0,2).join(' ')}</span><span class="chip-score">${s.total??'—'}%</span>${w?`<span class="chip-skill">${w}</span>`:''}</div>`;}).join('')}
                </div>
              </div>`:''}

              ${done2.length===0?'<div class="gc-none">нет данных</div>':''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

(async () => {
  try {
    const [r1,r2] = await Promise.all([fetchSheet('Data'),fetchSheet('Data_high')]);
    render([...parseRows(r1,false),...parseRows(r2,true)]);
  } catch(e) {
    document.getElementById('app').innerHTML=`
      <div class="loading" style="color:var(--bordeaux)">
        <div style="font-size:14px;font-weight:700">Ошибка загрузки</div>
        <div style="font-size:11px;color:var(--text-hint)">${e.message}</div>
        <div style="font-size:11px;color:var(--text-hint);margin-top:4px">Открывай с веб-сервера, не через file://</div>
      </div>`;
  }
})();
</script>
</body>
</html>
